<!DOCTYPE html>
<html>
<head>
    <title>AI Image Redesign</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
            min-height: 350px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #333;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .placeholder {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>AI Image Redesign</h1>

<div class="main-container">

    <!-- 🔹 FORM SECTION -->
    <div class="card">
        <h3>Upload & Prompt</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Generate</button>
        </form>
    </div>

    <!-- 🔹 ORIGINAL IMAGE -->
    <div class="card">
        <h3>Original Image</h3>

        {% if form.instance.original_image %}
            <img src="{{ form.instance.original_image.url }}">
        {% else %}
            <p class="placeholder">No image uploaded</p>
        {% endif %}
    </div>

    <!-- 🔹 OUTPUT IMAGE -->
    <div class="card">
        <h3>Redesigned Image</h3>

        {% if output_path %}
            <img src="/media/{{ output_path }}">
        {% else %}
            <p class="placeholder">Output will appear here</p>
        {% endif %}
    </div>

</div>

</body>
</html>
